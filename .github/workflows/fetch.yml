name: 탄소배출권 가격 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 가격 수집 실행
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        run: python3 fetch_prices.py

      - name: 변경사항 커밋
        run: |
          git config user.name "carbon-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "데이터 자동 갱신: $(date +'%Y-%m-%d')"
            git push
          fi
